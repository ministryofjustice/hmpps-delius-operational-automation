name: "LDAP: RBAC Uplift"
on:
  workflow_dispatch:
    inputs:
      environment:
          required: true
          type: choice
          options:
            - "dev"
            - "test"
            - "stage"
            - "preprod"
            - "prod"
            - "training"

      rbac_tag:
        required: true
        type: string

jobs:
    deploy:
        name: Create ECS Task in delius-core ${{ github.event.inputs.environment }}-preapproved
        runs-on: ubuntu-latest
        environment: delius-core-${{ github.event.inputs.environment }}-preapproved
        permissions:
          id-token: write
        steps:
          - name: Checkout code
            uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            
          - name: Configure AWS Credentials
            uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
            with:
              role-to-assume: "arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/modernisation-platform-oidc-cicd"
              role-session-name: "hmpps-delius-operational-automation-${{ github.run_number }}"
              aws-region: "eu-west-2"
          - name: Set cluster ARN
            id: set-cluster-arn
            run: |
                echo "CLUSTER_ARN=delius-core-${{ github.event.inputs.environment }}-cluster" >> $GITHUB_OUTPUT        
          - name: Get security groups and subnet ids
            id: get-ids
            run: |
                echo "SEC_GROUPS=$(aws ec2 describe-security-groups --filters "Name=group-name,Values=ecs-service-ldap-${{ github.event.inputs.environment }}" --query "SecurityGroups[].GroupId" --output json | jq -s -c '.[]')" >> $GITHUB_OUTPUT
                echo "SUBNET_IDS=$(aws ec2 describe-subnets --filters "Name=tag:Name,Values=*general-private-eu-west-2b,*general-private-eu-west-2c" --query "Subnets[].SubnetId" --output json | jq -s -c '.[]')" >> $GITHUB_OUTPUT
          # - name: Update RBAC Version SSM Parameter
          #   id: update-ssm
          #   run: |
          #       aws ssm put-parameter --name "/delius-core-${{ github.event.inputs.environment }}/LDAP_RBAC_VERSION" --value "${{ github.event.inputs.rbac_tag }}" --overwrite
          
                
          - name: Template task def with jq
            id: render
            run: |
              OUTPUT_FILE="task-def.json"

              jq \
                --arg executionRoleArn "arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/${{ github.event.inputs.environment }}-ldap-ecs-task-exec" \
                --arg taskRoleArn "arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/${{ github.event.inputs.environment }}-ldap-ecs-task" \
                --arg image "ghcr.io/ministryofjustice/hmpps-ldap-automation:${{ vars.LDAP_AUTOMATION_IMAGE_TAG }}" \
                --arg containerName "ldap-automation-task-${{ github.run_id }}" \
                --arg logGroup "/ecs/ldap-automation-${{ github.event.inputs.environment }}" \
                --arg logRegion "${{ secrets.AWS_REGION }}" \
                --arg logStreamPrefix "${{ github.run_id }}" \
                --arg rbacTag "${{ github.event.inputs.rbac_tag }}" \
                --arg awsRegion "${{ secrets.AWS_REGION }}" \
                --arg awsAccountId "${{ vars.AWS_ACCOUNT_ID }}" \
                --arg env "${{ github.event.inputs.environment }}" \
                '
                .executionRoleArn = $executionRoleArn
                | .taskRoleArn = $taskRoleArn
                | .containerDefinitions[0].image = $image
                | .containerDefinitions[0].containerName = $containerName

                # command
                | .containerDefinitions[0].command = ["ldap-automation", "rbac-uplift", "-t", $rbacTag]

                # secrets
                | .containerDefinitions[0].secrets = [
                  {name: "SECRET_LDAP_BIND_PASSWORD", valueFrom: "arn:aws:ssm:\($awsRegion):\($awsAccountId):parameter/delius-core-\($env)/LDAP_BIND_PASSWORD"},
                  {name: "SECRET_LDAP_ADMIN_PASSWORD", valueFrom: "arn:aws:ssm:\($awsRegion):\($awsAccountId):parameter/delius-core-\($env)/LDAP_ADMIN_PASSWORD"},
                  {name: "SECRET_oasys_user", valueFrom: "arn:aws:ssm:\($awsRegion):\($awsAccountId):parameter/delius-core-\($env)/oasys_user"},
                  {name: "SECRET_oasys_user_password", valueFrom: "arn:aws:ssm:\($awsRegion):\($awsAccountId):parameter/delius-core-\($env)/oasys_password"},
                  {name: "SECRET_iaps_user", valueFrom: "arn:aws:ssm:\($awsRegion):\($awsAccountId):parameter/delius-core-\($env)/iaps_user"},
                  {name: "SECRET_iaps_user_password", valueFrom: "arn:aws:ssm:\($awsRegion):\($awsAccountId):parameter/delius-core-\($env)/iaps_user_password"},
                  {name: "SECRET_dss_user", valueFrom: "arn:aws:ssm:\($awsRegion):\($awsAccountId):parameter/delius-core-\($env)/dss_user"},
                  {name: "SECRET_dss_user_password", valueFrom: "arn:aws:ssm:\($awsRegion):\($awsAccountId):parameter/delius-core-\($env)/dss_user_password"},
                  {name: "SECRET_casenotes_user", valueFrom: "arn:aws:ssm:\($awsRegion):\($awsAccountId):parameter/delius-core-\($env)/casenotes_user"},
                  {name: "SECRET_casenotes_password", valueFrom: "arn:aws:ssm:\($awsRegion):\($awsAccountId):parameter/delius-core-\($env)/casenotes_user_password"},
                  {name: "SECRET_test_user_password", valueFrom: "arn:aws:ssm:\($awsRegion):\($awsAccountId):parameter/delius-core-\($env)/test_user_password"},
                  {name: "SECRET_gdpr_api_client_secret", valueFrom: "arn:aws:ssm:\($awsRegion):\($awsAccountId):parameter/delius-core-\($env)/gdpr_api_client_secret"},
                  {name: "SECRET_pwm_config_password", valueFrom: "arn:aws:ssm:\($awsRegion):\($awsAccountId):parameter/delius-core-\($env)/pwm_config_password"},
                  {name: "SECRET_merge_api_client_secret", valueFrom: "arn:aws:ssm:\($awsRegion):\($awsAccountId):parameter/delius-core-\($env)/merge_api_client_secret"},
                  {name: "SECRET_umt_client_secret", valueFrom: "arn:aws:ssm:\($awsRegion):\($awsAccountId):parameter/delius-core-\($env)/umt_client_secret"},
                  {name: "VAR_LDAP_HOST", valueFrom: "arn:aws:ssm:\($awsRegion):\($awsAccountId):parameter/delius-core-\($env)/LDAP_HOST"},
                  {name: "VAR_LDAP_USER", valueFrom: "arn:aws:ssm:\($awsRegion):\($awsAccountId):parameter/delius-core-\($env)/LDAP_PRINCIPAL"},
                  {name: "SECRET_performance_test_user_password", valueFrom: "arn:aws:ssm:\($awsRegion):\($awsAccountId):parameter/delius-core-\($env)/performance_test_user_password"}
                ]

                # environment
                | .containerDefinitions[0].environment = [
                  {name: "VAR_SSM_PREFIX", value: "SSM_"},
                  {name: "VAR_PROJECT_NAME", value: "delius-core"},
                  {name: "VAR_ENVIRONMENT_NAME", value: "delius-core-\($env)"},
                  {name: "VAR_LDAP_ADMIN_USERNAME", value: "root"}
                ]

                # logs
                | .containerDefinitions[0].logConfiguration.options["awslogs-group"] = $logGroup
                | .containerDefinitions[0].logConfiguration.options["awslogs-region"] = $logRegion
                | .containerDefinitions[0].logConfiguration.options["awslogs-stream-prefix"] = $logStreamPrefix
                ' \
                ./docker/ldap-automation/task-def.json > "$OUTPUT_FILE"

              echo "rendered-json-file=$OUTPUT_FILE" >> "$GITHUB_OUTPUT"
                    
          - name: Show rendered task definition
          run: |
            cat ${{ steps.render.outputs.rendered-json-file }}
          # - name: Show rendered user service task
          #   if: github.ref != 'refs/heads/main'
          #   run: cat ${{ steps.render.outputs.rendered-json-file }}
