name: "Oracle: Schedule Backups"
on:
  # Schedules are defined in UTC.  Therefore for each Schedule expression we
  # need to provide a GMT and BST variant (GMT=UTC, BST=1 hour ahead of UTC)
  # Both schedules will be triggered but only one will be acted on depending
  # on whether it is currently GMT or BST.
  schedule:
    - cron: '0 7 * * 1,2,4,5'   # 7am GMT Runs (Mon,Tue,Thu,Fri)
    - cron: '0 6 * * 1,2,4,5'   # 7am BST Runs (Mon,Tue,Thu,Fri)
    - cron: '0 7 * * 3'         # 7am GMT Runs (Wed)
    - cron: '0 6 * * 3'         # 7am BST Runs (Wed)
    - cron: '30 6 * * 3'        # 6:30am GMT Runs (Wed)
    - cron: '30 5 * * 3'        # 6:30am BST runs (Wed)
    - cron: '0 2 * * 0'         # 2am GMT Runs (Sun)
    - cron: '0 1 * * 0'         # 2am BST Runs (Sun)
    - cron: '0 3 * * 1-6'       # 3am GMT Runs (Mon-Sat)
    - cron: '0 2 * * 1-6'       # 3am BST Runs (Mon-Sat)
    - cron: '0 12 * * 1-5'        # GMT Hourly Noon Runs (Archivelogs)
    - cron: '0 11 * * 1-5'        # BST Hourly Noon Runs (Archivelogs)
    - cron: '41 * * * *'   # GMT/BST Hourly Runs (Archivelogs)
    - cron: '0 0 * * 0' # Midnight GMT Runs (Sun)
    - cron: '0 23 * * 6' # Midnight BST Runs (Sun)
    - cron: '0 0 * * 1-6' # Midnight GMT Runs (Mon-Sat)
    - cron: '0 23 * * 0-5' # Midnight BST Runs (Mon-Sat)

jobs:
  prepare-run-matrix:
    runs-on: ubuntu-latest
    outputs:
      scheduled_matrix: ${{ steps.filter-backups-schedule.outputs.scheduling_matrix }}
      type: object
    steps:
      - name: Checkout Backups Schedule
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout-cone-mode: false
          sparse-checkout: |
             .github/workflows/oracle-db-backups-schedule.json
             common/files/convert_cron_expression_to_London.py
          path: operations
          ref: main
          fetch-depth: 0

      - name: Filter Backups Schedule
        id: filter-backups-schedule
        run: |
            set -euo pipefail

            # Convert Cron Expression for the Schedule to Europe/London timezone
            CRONSCHEDULE=$(python3 operations/common/files/convert_cron_expression_to_London.py "${{ github.event.schedule }}")
            SCHEDULED_JSON=$(jq --arg CRONSCHEDULE "$CRONSCHEDULE" '[.[] | select(.CronSchedule == $CRONSCHEDULE) | {"TargetEnvironment": .TargetEnvironment, "TargetHost": .TargetHost, "Period": .Period, "FixAbsentChunks": (.FixAbsentChunks // "yes"), "BackupStandbyOnPrimaryFailure": (.BackupStandbyOnPrimaryFailure // "yes")}]' operations/.github/workflows/oracle-db-backups-schedule.json | jq '{include: .}')
            echo "scheduling_matrix="$(echo ${SCHEDULED_JSON} | sed 's/ //g') >> $GITHUB_OUTPUT

  report-schedule-backup:
    needs: prepare-run-matrix
    runs-on: ubuntu-latest
    if: ${{ fromJson(needs.prepare-run-matrix.outputs.scheduled_matrix).include[0] }}
    steps:
      - name: Report Backups Scheduled to Run
        id: report-run
        run: |
              echo "Running Backups for these targets: ${{ needs.prepare-run-matrix.outputs.scheduled_matrix }}"
 
  report-no-scheduled-backup:
    needs: prepare-run-matrix
    runs-on: ubuntu-latest
    if: ${{ ! fromJson(needs.prepare-run-matrix.outputs.scheduled_matrix).include[0] }}
    steps:
        - name: Report Nothing to Do
          id: report-no-run
          run: |
              echo "No targets scheduled for backup run."

  run-backup:
    needs: prepare-run-matrix
    if: ${{ fromJson(needs.prepare-run-matrix.outputs.scheduled_matrix).include[0] }}
    strategy:
      fail-fast: false
      matrix: ${{fromJson(needs.prepare-run-matrix.outputs.scheduled_matrix)}}
    name: "run-${{ format('{0}-{1}-{2}', matrix.TargetEnvironment, matrix.Period, matrix.TargetHost) }}-backup"
    uses:
      ministryofjustice/hmpps-delius-operational-automation/.github/workflows/oracle-db-backup.yml@main
    with:
      TargetEnvironment: ${{ matrix.TargetEnvironment }}
      TargetHost: ${{ matrix.TargetHost }}
      Period: ${{ matrix.Period }}
      FixAbsentChunks: ${{ matrix.FixAbsentChunks || 'yes' }}
      BackupStandbyOnPrimaryFailure: ${{ matrix.BackupStandbyOnPrimaryFailure || 'yes' }}
    secrets: inherit

  # If the GHA fails during calculation of the scheduling matrix we will not have configured
  # any specific environment to use yet, so we default to running the failure notification from
  # the development OEM environment (this is arbitrary)
  setup-notification-failure-slack:
    if: failure()
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ministryofjustice/hmpps-delius-operational-automation:0.80.0
    needs: [prepare-run-matrix]
    environment: "hmpps-oem-development-preapproved"
    permissions:
       id-token: write
    steps:

      - name: Checkout Local Repo to get Composite Action
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Send Slack Failure Notification
        id: foreground_slack_notification
        uses: ./.github/actions/send-slack-notification
        env:
            AWS_ACCOUNT_ID: "${{ vars.AWS_ACCOUNT_ID }}"
        with:
          Emoji: ":github-red:"
          TextHeader: "Backup Job Scheduling Failure"
          TextBody: ":cross-red: Backup job could not be scheduled"
          TargetEnvironment: "GHA(Scheduling)"
          JobName: "prepare-run-matrix"